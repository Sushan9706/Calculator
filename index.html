<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Team Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator-container">
    <h1>Simple Calculator (Extensible)</h1>
    <section class="display" aria-label="Calculator output">
      <div id="history" class="history"></div>
      <input id="output" class="output" type="text" readonly value="0" />
    </section>

    <section class="buttons" aria-label="Calculator buttons">
      <button data-key="7">7</button>
      <button data-key="8">8</button>
      <button data-key="9">9</button>
      <button data-op="/">÷</button>

      <button data-key="4">4</button>
      <button data-key="5">5</button>
      <button data-key="6">6</button>
      <button data-op="*">×</button>

      <button data-key="1">1</button>
      <button data-key="2">2</button>
      <button data-key="3">3</button>
      <button data-op="-">−</button>

      <button data-key="0">0</button>
      <button data-dot=".">.</button>
      <button id="equals" data-eq="=">=</button>
      <button data-op="+">+</button>

      <button id="clear">C</button>
      <button id="delete">DEL</button>
    </section>

    <section class="extension-guide">
      <h2>Team Extension Guide</h2>
      <p>Add new operator modules in <code>ops/</code>.</p>
      <p>Current core supports add/subtract/multiply/divide with plugin-ready design.</p>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
